<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muhammad Irfan | Portofolio Profesional</title>

    <!-- Meta Deskripsi untuk SEO -->
    <meta name="description"
        content="Portofolio Profesional Muhammad Irfan, Mahasiswa Geofisika Universitas Hasanuddin. Keahlian: Seismik, Python, Excel, MATLAB, dan ArcGIS.">

    <!-- FontAwesome untuk Ikon -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <!-- Google Fonts: Inter & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg-dark: #070912;
            --primary-glow: #4f46e5;
            --secondary-glow: #0ea5e9;
            --accent: #38bdf8;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-hover: rgba(255, 255, 255, 0.06);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            line-height: 1.6;
        }

        p {
            font-family: 'Inter', sans-serif;
        }

        /* Animated Background Elements */
        .color-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.6;
            animation: float 20s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
        }

        .orb-1 {
            width: 45vw;
            height: 45vw;
            background: rgba(79, 70, 229, 0.25);
            top: -15vw;
            left: -15vw;
        }

        .orb-2 {
            width: 50vw;
            height: 50vw;
            background: rgba(14, 165, 233, 0.2);
            bottom: -20vw;
            right: -10vw;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 30vw;
            height: 30vw;
            background: rgba(139, 92, 246, 0.15);
            top: 40%;
            left: 30%;
            animation-delay: -10s;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
            }

            50% {
                transform: translate(10vw, 5vw) scale(1.1);
            }

            100% {
                transform: translate(-5vw, 10vw) scale(0.9);
            }
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 5rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 4rem;
        }

        /* Hero Section */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 1.5rem;
            animation: fadeInDown 1s ease-out forwards;
            opacity: 0;
            padding-bottom: 2rem;
        }

        .hero h1 {
            font-size: 4rem;
            font-weight: 800;
            line-height: 1.1;
            background: linear-gradient(135deg, #ffffff 0%, #cbd5e1 50%, #818cf8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1.5px;
            margin-bottom: 0.5rem;
        }

        .hero h2 {
            font-size: 1.4rem;
            font-weight: 300;
            color: var(--text-muted);
            max-width: 600px;
        }

        .hero h2 span {
            color: var(--accent);
            font-weight: 600;
            display: inline-block;
            position: relative;
        }

        .hero h2 span::after {
            content: '';
            position: absolute;
            bottom: -3px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--accent);
            opacity: 0.4;
            border-radius: 2px;
        }

        /* Glassmorphism Panels */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1s ease-out forwards;
            animation-delay: 0.2s;
            position: relative;
            overflow: hidden;
        }

        /* Decorative gradient line top of panels */
        .glass-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
        }

        .section-title {
            font-size: 1.7rem;
            font-weight: 600;
            margin-bottom: 2.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            letter-spacing: -0.5px;
        }

        .section-title i {
            color: #818cf8;
            font-size: 1.4rem;
            background: rgba(129, 140, 248, 0.1);
            padding: 0.75rem;
            border-radius: 12px;
        }

        /* Skills Grid */
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1.5rem;
        }

        .skill-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 1.2rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: default;
            position: relative;
            overflow: hidden;
        }

        .skill-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.05) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.4s ease;
            transform: scale(0.5);
            transition: transform 0.4s ease, opacity 0.4s ease;
        }

        .skill-card:hover {
            transform: translateY(-8px);
            background: var(--glass-hover);
            border-color: rgba(129, 140, 248, 0.3);
            box-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.5), 0 0 20px rgba(129, 140, 248, 0.1);
        }

        .skill-card:hover::before {
            opacity: 1;
            transform: scale(1);
        }

        .skill-card i {
            font-size: 2.8rem;
            color: #64748b;
            transition: all 0.4s ease;
        }

        .skill-card span {
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: #cbd5e1;
            transition: color 0.3s ease;
        }

        /* Hover Colors for specific skills */
        .skill-card:hover .fa-wave-square {
            color: #f59e0b;
            filter: drop-shadow(0 0 10px rgba(245, 158, 11, 0.4));
            transform: scale(1.1);
        }

        .skill-card:hover .fa-python {
            color: #3b82f6;
            filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.4));
            transform: scale(1.1);
        }

        .skill-card:hover .fa-file-excel {
            color: #10b981;
            filter: drop-shadow(0 0 10px rgba(16, 185, 129, 0.4));
            transform: scale(1.1);
        }

        .skill-card:hover .fa-square-root-variable {
            color: #f43f5e;
            filter: drop-shadow(0 0 10px rgba(244, 63, 94, 0.4));
            transform: scale(1.1);
        }

        .skill-card:hover .fa-globe {
            color: #0ea5e9;
            filter: drop-shadow(0 0 10px rgba(14, 165, 233, 0.4));
            transform: scale(1.1);
        }

        .skill-card:hover span {
            color: #ffffff;
        }

        /* Social Section */
        .social-header-text {
            color: var(--text-muted);
            margin-bottom: 2.5rem;
            text-align: center;
            max-width: 600px;
            margin-inline: auto;
            font-size: 1.1rem;
        }

        .social-links {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .social-btn {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem 2.5rem;
            border-radius: 50px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            position: relative;
            z-index: 1;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .social-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            transition: opacity 0.3s ease;
            opacity: 0.8;
        }

        .btn-ig::before {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }

        .btn-in::before {
            background: linear-gradient(45deg, #0077b5, #005e93);
        }

        .social-btn:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 15px 25px -5px rgba(0, 0, 0, 0.4), 0 0 15px rgba(255, 255, 255, 0.1);
        }

        .social-btn:hover::before {
            opacity: 1;
        }

        .social-btn i {
            font-size: 1.3rem;
        }

        /* Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .delay-1 {
            animation-delay: 0.1s;
        }

        .delay-2 {
            animation-delay: 0.3s;
        }

        .delay-3 {
            animation-delay: 0.5s;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                padding: 3rem 1.5rem;
                gap: 3rem;
            }

            .hero h1 {
                font-size: 2.8rem;
            }

            .hero h2 {
                font-size: 1.2rem;
            }

            .glass-panel {
                padding: 2rem 1.5rem;
            }

            .social-btn {
                width: 100%;
                justify-content: center;
            }

            .skills-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .skills-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <!-- Latar Belakang Animasi Dinamis -->
    <div class="color-orb orb-1"></div>
    <div class="color-orb orb-2"></div>
    <div class="color-orb orb-3"></div>

    <main class="container">
        <!-- Bagian Pengenalan (Hero) -->
        <header class="hero delay-1">
            <h1>Muhammad Irfan</h1>
            <h2>Mahasiswa <span>Geofisika</span><br>Universitas Hasanuddin</h2>
        </header>

        <!-- Bagian Keahlian -->
        <section class="glass-panel delay-2" id="keahlian">
            <h3 class="section-title"><i class="fa-solid fa-code-branch"></i> Keahlian Teknikal</h3>
            <div class="skills-grid">
                <!-- Seismik -->
                <div class="skill-card">
                    <i class="fa-solid fa-wave-square"></i>
                    <span>Seismik</span>
                </div>
                <!-- Python -->
                <div class="skill-card">
                    <i class="fa-brands fa-python"></i>
                    <span>Python</span>
                </div>
                <!-- Excel -->
                <div class="skill-card">
                    <i class="fa-solid fa-file-excel"></i>
                    <span>Excel</span>
                </div>
                <!-- MATLAB -->
                <div class="skill-card">
                    <i class="fa-solid fa-square-root-variable"></i>
                    <span>MATLAB</span>
                </div>
                <!-- ArcGIS -->
                <div class="skill-card">
                    <i class="fa-solid fa-globe"></i>
                    <span>ArcGIS (Basic)</span>
                </div>
            </div>
        </section>

        <!-- Bagian Sosial & Kontak -->
        <section class="glass-panel delay-3" id="kontak">
            <h3 class="section-title"><i class="fa-regular fa-handshake"></i> Mari Terhubung</h3>
            <p class="social-header-text">
                Terkoneksi dengan saya melalui platform profesional untuk diskusi riset geosains, kolaborasi proyek, dan
                peluang jaringan karir.
            </p>
            <div class="social-links">
                <!-- Instagram Link -->
                <a href="https://www.instagram.com/mhmmadrfan?igsh=d2huZ21nZnNiMWV6" target="_blank"
                    rel="noopener noreferrer" class="social-btn btn-ig">
                    <i class="fa-brands fa-instagram"></i> Instagram
                </a>
                <!-- LinkedIn Link -->
                <a href="https://www.linkedin.com/in/muhammad-irfan-2667452a9?utm_source=share_via&amp;utm_content=profile&amp;utm_medium=member_android"
                    target="_blank" rel="noopener noreferrer" class="social-btn btn-in">
                    <i class="fa-brands fa-linkedin-in"></i> LinkedIn
                </a>
            </div>
        </section>
    </main>
</body>

</html>
